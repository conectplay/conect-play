  <text x="90" y="345" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#E6BB55">filmes e séries</text>
  <text x="90" y="420" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FAFAF9">em um só lugar</text>

  <text x="90" y="475" font-family="Arial, sans-serif" font-size="24" fill="#A6A39B">+200 canais · Suporte 24/7 · Smart TV, TV Box, celular e PC</text>

